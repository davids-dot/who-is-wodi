# Koyeb 部署配置文件
# 文档: https://www.koyeb.com/docs/quick-start#deploy-using-the-yaml-configuration-file
#
# 使用方式：
#   1. 在 Koyeb 控制台创建 Service，选择 "Deploy from Dockerfile"
#   2. 或通过 koyeb CLI: koyeb app init --docker ./
#   3. 在 Koyeb 控制台的 Environment Variables 中设置 LLM_API_KEY 等 Secret

services:
  - name: who-is-wodi
    type: web
    dockerfile: ./Dockerfile
    ports:
      - port: 5201
        protocol: http
    health_check:
      path: /health
      interval: 30s
      timeout: 10s
      retries: 3
    env:
      - key: NACOS_ENABLED
        value: "false"
      - key: BASE_PATH
        value: ""
      - key: LLM_BASE_URL
        value: "https://api.deepseek.com/v1"
      - key: LLM_MODEL_CHAT
        value: "deepseek-chat"
      - key: LLM_PROVIDER
        value: "deepseek"
      - key: LLM_API_KEY
        type: secret
    resources:
      instance_type: free
    scaling:
      min: 1
      max: 1
