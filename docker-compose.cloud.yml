# 公网部署用 docker-compose 配置
# 与 docker-compose.yml 的区别：
#   - 移除 cube-network 外部网络
#   - 移除 Nacos 相关环境变量（NACOS_ENABLED=false）
#   - 移除 db.config.json 和 logs 卷挂载
#   - 新增 LLM 云端 API 环境变量
#   - 新增 BASE_PATH 环境变量（空字符串，根路径）
#
# 使用方式：
#   docker compose -f docker-compose.cloud.yml up -d

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: who-is-wodi
    ports:
      - "${HOST_PORT:-5201}:5201"
    environment:
      - NACOS_ENABLED=false
      - BASE_PATH=
      # LLM 云端 API 配置（必填）
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL_CHAT=${LLM_MODEL_CHAT:-deepseek-chat}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5201/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
